<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디스플레이 시물레이션</title>
<style>
  :root {
    /* 브랜드 컬러 적용 (기존 색상 유지) */
    --brand-color: #26c797; 
    --brand-light: rgba(38, 199, 151, 0.1);
    --brand-shadow: rgba(38, 199, 151, 0.4);
  }

  /* 기본 설정 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f2f2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  
  /* 헤더 스타일 */
  .brand-header {
    font-size: 14px;
    font-weight: 800;
    color: var(--brand-color);
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .title-section {
    text-align: center;
    margin-bottom: 10px;
    padding: 0 20px;
  }
  .title-section h1 { margin: 0 0 5px 0; font-size: 26px; color: #1c1c1e; letter-spacing: -0.5px; }
  .title-section p { margin: 0; font-size: 15px; color: #8e8e93; line-height: 1.4; }

  /* 3D 화면 구성 */
  .scene {
    width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; perspective: 1200px;
  }
  .ipad-assembly {
    position: relative; width: 240px; height: 340px; transform-style: preserve-3d; transform: rotateX(55deg) rotateZ(-35deg); 
  }
  .layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 20px; box-sizing: border-box; transition: transform 0.1s ease-out, opacity 0.2s ease-out;
  }

  /* 1층: 하우징 */
  .layer-housing { background: #d1d1d6; box-shadow: 0 20px 20px rgba(0,0,0,0.2), inset 0 0 10px rgba(0,0,0,0.1); transform: translateZ(0px); border: 3px solid #b0b0b5; position: relative; overflow: hidden; }
  .inner-logicboard { position: absolute; top: 20px; left: 15px; width: 70px; height: 240px; background: #2c2c2e; border-radius: 4px; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); }
  .inner-camera { position: absolute; top: 20px; right: 15px; width: 60px; height: 60px; background: #111; border-radius: 10px; }
  .inner-taptic { position: absolute; bottom: 25px; left: 15px; width: 70px; height: 40px; background: #8e8e93; border-radius: 4px; }
  .inner-battery { position: absolute; bottom: 25px; right: 15px; width: 110px; height: 190px; background: #1c1c1e; border-radius: 4px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; color: #48484a; font-size: 10px; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: all 0.3s; }
  .liquid-drop { position: absolute; background: rgba(0, 122, 255, 0.6); border-radius: 50%; filter: blur(2px); opacity: 0; transition: opacity 0.3s; }

  /* 2층: LCD */
  .layer-lcd { background: #1c1c1e; transform: translateZ(12px); border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; color: #f2f2f7; font-weight: 600; }
  .lcd-broken { background: repeating-linear-gradient(90deg, #ffffff, #ffffff 30px, #34c759 30px, #34c759 32px, #ffffff 32px, #ffffff 70px, #34c759 70px, #34c759 75px) !important; color: transparent !important; animation: glitch 0.05s infinite alternate; }
  @keyframes glitch { 0% { opacity: 0.95; } 100% { opacity: 1; } }

  /* 3층: 접착제 */
  .layer-adhesive { background: repeating-linear-gradient(-45deg, rgba(255,149,0,0.75), rgba(255,149,0,0.75) 10px, rgba(255,59,48,0.75) 10px, rgba(255,59,48,0.75) 20px); transform: translateZ(14px); color: white; font-weight: 600; display: flex; align-items: center; justify-content: center; opacity: 0; }

  /* 4층: 유리 */
  .layer-glass { background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); border: 3px solid rgba(255, 255, 255, 0.8); transform: translateZ(18px); color: #1c1c1e; font-weight: 600; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,255,255,0.4); overflow: hidden; }
  .glass-scratch { position: absolute; top: 10%; left: 20%; width: 120px; height: 3px; background: rgba(255, 255, 255, 0.9); transform: rotate(35deg); box-shadow: 0 0 4px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; }
  .glass-dent { position: absolute; bottom: 20%; right: 20%; width: 15px; height: 15px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; }

  /* 컨트롤 패널 레이아웃 */
  .controls-wrapper { display: flex; gap: 15px; width: 90%; max-width: 700px; margin-top: 10px; }
  .controls-left, .controls-right { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; display: flex; flex-direction: column; border-top: 4px solid transparent; transition: border-color 0.3s; }
  
  /* 포커스된 패널에 브랜드 컬러 띠 표시 */
  .controls-left:hover, .controls-right:hover { border-top: 4px solid var(--brand-color); }

  .section-title { font-size: 14px; font-weight: 700; color: #1c1c1e; margin-bottom: 12px; border-bottom: 1px solid #e5e5ea; padding-bottom: 5px; }

  /* 브랜드 스타일 모드 스위치 */
  .mode-switch { display: flex; background: #e5e5ea; border-radius: 8px; padding: 3px; margin-bottom: 15px; }
  .mode-btn { flex: 1; padding: 8px 0; text-align: center; border-radius: 6px; font-size: 14px; font-weight: 600; color: #8e8e93; cursor: pointer; transition: all 0.2s; }
  .mode-btn.active { background: white; color: var(--brand-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid var(--brand-color); }

  /* 브랜드 스타일 슬라이더 */
  .slider-container { display: flex; align-items: center; gap: 10px; color: #8e8e93; font-weight: 500; font-size: 13px; margin-bottom: 15px; }
  input[type=range] { flex: 1; height: 6px; background: #e5e5ea; border-radius: 3px; outline: none; -webkit-appearance: none; }
  input[type=range]::-webkit-slider-thumb { 
    -webkit-appearance: none; width: 24px; height: 24px; 
    background: var(--brand-color); 
    border-radius: 50%; box-shadow: 0 2px 8px var(--brand-shadow); cursor: pointer;
  }
  
  .issue-toggle { font-size: 14px; font-weight: 600; color: #d32f2f; display: none; align-items: center; gap: 8px; }
  .issue-toggle input { accent-color: #ff3b30; width: 16px; height: 16px; }

  /* 정책 체크리스트 */
  .policy-check { display: flex; flex-direction: column; gap: 10px; font-size: 14px; color: #3a3a3c; font-weight: 500; }
  .policy-check label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  /* 체크박스 선택 시 브랜드 컬러 반영 */
  .policy-check input { accent-color: var(--brand-color); width: 18px; height: 18px; }
  
  .policy-result {
    margin-top: auto; padding: 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 15px;
    background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; transition: all 0.3s;
  }
  .policy-result.denied { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

</style>
</head>
<body>

<div class="title-section">
  <h1>디스플레이 시뮬레이션</h1>
  <p>유리 분리 증상 발생 시, 나타날수 있는 문제에 대한 사전 안내입니다..</p>
</div>

<div class="scene">
  <div class="ipad-assembly">
    <div class="layer layer-housing">
      <div class="inner-logicboard"></div>
      <div class="inner-camera"></div>
      <div class="inner-taptic"></div>
      <div class="inner-battery" id="batteryObj">Li-ion Battery</div>
      <div class="liquid-drop" id="liq1" style="top: 30%; left: 40%; width: 40px; height: 40px;"></div>
      <div class="liquid-drop" id="liq2" style="top: 60%; right: 20%; width: 30px; height: 30px;"></div>
      <div class="liquid-drop" id="liq3" style="bottom: 20%; left: 30%; width: 50px; height: 50px;"></div>
    </div>
    <div class="layer layer-lcd" id="lcd">내부 패널 (LCD/OLED)</div>
    <div class="layer layer-adhesive" id="adhesive">접착제 찢어짐!</div>
    <div class="layer layer-glass" id="glass">
      전면 유리 (Glass)
      <div class="glass-scratch" id="dmgScratch"></div>
      <div class="glass-dent" id="dmgDent"></div>
    </div>
  </div>
</div>

<div class="controls-wrapper">
  <!-- 왼쪽 -->
  <div class="controls-left">
    <div class="section-title">1. 디스플레이 분해 시뮬레이션</div>
    <div class="mode-switch">
      <div class="mode-btn active" id="btnNormal" onclick="setMode('normal')">✅ 정상 분리</div>
      <div class="mode-btn" id="btnError" onclick="setMode('error')">⚠️ 비정상 (유리 분리)</div>
    </div>
    <div class="slider-container">
      <span>닫힘</span>
      <input type="range" id="liftSlider" min="0" max="100" value="0">
      <span>열림</span>
    </div>
    <label class="issue-toggle" id="issueToggle">
      <input type="checkbox" id="chkIssue"> 기능 이상(백화/세로줄)
    </label>
  </div>

  <!-- 오른쪽 -->
  <div class="controls-right">
    <div class="section-title">2. 예외적 무상 서비스 심사 (보증 만료 시)</div>
    <div class="policy-check">
      <label><input type="checkbox" id="chkDamage" onchange="checkPolicy()"> 🚫 외관 손상 발견 (찍힘, 깊은 긁힘, 파손)</label>
      <label><input type="checkbox" id="chkLiquid" onchange="checkPolicy()"> 💧 내부 액체 유입 발견 (침수 라벨 변색)</label>
      <label><input type="checkbox" id="chkThirdParty" onchange="checkPolicy()"> 🔧 타사 부품/임의 개조 발견 (사설 수리)</label>
    </div>
    <div class="policy-result" id="policyResult">
      ✅ 무상 교체 가능 (손상 없음)
    </div>
  </div>
</div>

<script>
  let currentMode = 'normal';
  const slider = document.getElementById('liftSlider');
  const glass = document.getElementById('glass');
  const lcd = document.getElementById('lcd');
  const adhesive = document.getElementById('adhesive');
  const btnNormal = document.getElementById('btnNormal');
  const btnError = document.getElementById('btnError');
  const issueToggle = document.getElementById('issueToggle');
  const chkIssue = document.getElementById('chkIssue');

  const chkDamage = document.getElementById('chkDamage');
  const chkLiquid = document.getElementById('chkLiquid');
  const chkThirdParty = document.getElementById('chkThirdParty');
  const policyResult = document.getElementById('policyResult');
  
  const dmgScratch = document.getElementById('dmgScratch');
  const dmgDent = document.getElementById('dmgDent');
  const liq1 = document.getElementById('liq1'), liq2 = document.getElementById('liq2'), liq3 = document.getElementById('liq3');
  const batteryObj = document.getElementById('batteryObj');

  chkIssue.addEventListener('change', (e) => {
    if(e.target.checked) lcd.classList.add('lcd-broken');
    else lcd.classList.remove('lcd-broken');
  });

  function setMode(mode) {
    currentMode = mode;
    if(mode === 'normal') {
      btnNormal.classList.add('active'); btnError.classList.remove('active');
      issueToggle.style.display = 'none'; chkIssue.checked = false; lcd.classList.remove('lcd-broken');
    } else {
      btnError.classList.add('active'); btnNormal.classList.remove('active');
      issueToggle.style.display = 'flex';
    }
    slider.value = 0; updateVisualization(0);
  }

  function updateVisualization(val) {
    const lift = val * 1.5; const tilt = val * 0.4;
    if (currentMode === 'normal') {
      glass.style.transform = `translateZ(${18 + lift}px) rotateX(${tilt}deg)`;
      lcd.style.transform = `translateZ(${12 + lift}px) rotateX(${tilt}deg)`;
      adhesive.style.opacity = 0;
    } else if (currentMode === 'error') {
      glass.style.transform = `translateZ(${18 + lift}px) rotateX(${tilt}deg)`;
      lcd.style.transform = `translateZ(12px) rotateX(0deg)`;
      if (val < 15) adhesive.style.opacity = 0;
      else if (val < 70) {
        adhesive.style.opacity = 1 - ((val - 15) / 55);
        adhesive.style.transform = `translateZ(${14 + (val * 0.2)}px)`; 
      } else adhesive.style.opacity = 0;
    }
  }

  slider.addEventListener('input', (e) => updateVisualization(parseInt(e.target.value)));

  function checkPolicy() {
    const isDamage = chkDamage.checked;
    const isLiquid = chkLiquid.checked;
    const isThirdParty = chkThirdParty.checked;

    dmgScratch.style.opacity = isDamage ? 1 : 0;
    dmgDent.style.opacity = isDamage ? 1 : 0;
    liq1.style.opacity = isLiquid ? 1 : 0; liq2.style.opacity = isLiquid ? 1 : 0; liq3.style.opacity = isLiquid ? 1 : 0;

    if(isThirdParty) {
      batteryObj.style.background = "#ffcc00"; batteryObj.style.color = "#000"; batteryObj.innerText = "비정품 (Non-Genuine)";
    } else {
      batteryObj.style.background = "#1c1c1e"; batteryObj.style.color = "#48484a"; batteryObj.innerText = "Li-ion Battery";
    }

    if(isDamage || isLiquid || isThirdParty) {
      let reason = [];
      if(isDamage) reason.push("외관 손상");
      if(isLiquid) reason.push("침수");
      if(isThirdParty) reason.push("타사 부품");
      
      policyResult.className = "policy-result denied";
      policyResult.innerHTML = `❌ 무상 지원 불가 (유상 수리 진행)<br><span style="font-size:12px; font-weight:500;">사유: ${reason.join(", ")} 발견</span>`;
    } else {
      policyResult.className = "policy-result";
      policyResult.innerHTML = `✅ 무상 교체 가능 (예외적 지원)<br><span style="font-size:12px; font-weight:500;">기기 손상 및 개조 이력 없음</span>`;
    }
  }

  updateVisualization(0);
</script>

</body>
</html>
